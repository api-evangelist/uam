  - date: '2026-06-03'
    rating: 2
    summary: >-
      UAM has no centralized developer portal, but it operates a genuine,
      live, machine-readable API surface through Biblos-e Archivo, its DSpace
      7.6.5 institutional repository. Both the DSpace REST API root (reporting
      dspaceVersion "DSpace 7.6.5") and the OAI-PMH 2.0 endpoint (reporting
      repositoryName "Biblos-e Archivo. Repositorio Institucional de la UAM",
      protocolVersion 2.0) were verified live via content fetch. Direct curl
      probes returned HTTP 403 due to bot/WAF filtering, but the endpoints
      resolve and return valid payloads. Identity is handled by the gated
      ID-UAM federated service (not a documented public API). No official
      institutional GitHub organization was found (only research-group and
      student-club accounts). Nothing was fabricated; only confirmed surfaces
      are cataloged.
    endpoints:
